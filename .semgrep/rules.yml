rules:
  # ── Logging ──────────────────────────────────────────────────────────────────

  - id: request-body-logged
    patterns:
      - pattern: |
          $LOGGER.$LEVEL(
            ...,
            JSON.stringify({..., requestBody: ..., ...})
          )
    message: >
      `requestBody` is serialised into a log entry. If the request carries an API key,
      a raw private key, or other secrets those values will land in log storage.
      Redact or omit sensitive fields before logging.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-312: Cleartext Storage of Sensitive Information"
      confidence: HIGH

  # ── Secret handling ───────────────────────────────────────────────────────────

  - id: raw-private-key-from-env
    pattern: process.env.ECDSA_PRIVATE_KEY
    message: >
      Raw ECDSA private key is read from an environment variable. If the environment is
      compromised (logs, /proc leaks, container inspection) the signing key is exposed.
      Prefer an HSM or secrets manager — set SIGNING_MODULE=aws-kms for production.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-321: Use of Hard-coded Cryptographic Key"
      confidence: HIGH

  # ── Authentication ────────────────────────────────────────────────────────────

  - id: api-key-non-constant-time-lookup
    patterns:
      - pattern: |
          if (!$KEY || !$MAP[$KEY]) { ... }
      - metavariable-regex:
          metavariable: $MAP
          regex: '.*[Kk]ey.*|.*[Aa]uth.*|.*[Tt]oken.*'
    message: >
      Secret comparison via plain property access (`map[key]`) is not constant-time and
      may leak the key length or prefix through timing side-channels.
      Use `crypto.timingSafeEqual(Buffer.from(provided), Buffer.from(valid))` instead.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-208: Observable Timing Discrepancy"
      confidence: MEDIUM

  # ── Network / reliability ─────────────────────────────────────────────────────

  - id: axios-get-no-timeout
    patterns:
      - pattern: axios.get($URL, $OPTS)
      - pattern-not: "axios.get($URL, {..., timeout: ..., ...})"
    message: >
      `axios.get` call has no `timeout` option. A slow or unresponsive upstream will
      block the event loop indefinitely. Add `{ timeout: <ms> }`.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: reliability
      confidence: HIGH

  - id: axios-post-no-timeout
    patterns:
      - pattern: axios.post($URL, $BODY, $OPTS)
      - pattern-not: "axios.post($URL, $BODY, {..., timeout: ..., ...})"
    message: >
      `axios.post` call has no `timeout` option. A slow or unresponsive upstream will
      block the event loop indefinitely. Add `{ timeout: <ms> }`.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: reliability
      confidence: HIGH

  - id: axios-call-no-options
    patterns:
      - pattern-either:
          - pattern: axios.get($URL)
          - pattern: axios.post($URL, $BODY)
          - pattern: axios.put($URL, $BODY)
          - pattern: axios.delete($URL)
    message: >
      `axios` call has no options object at all — no `timeout`, no custom headers.
      Always specify at least `{ timeout: <ms> }` for network calls.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: reliability
      confidence: HIGH
