name: Continuous Delivery

on:
  push:
    branches: [main, dev]

env:
  NODE_VERSION: "24.x"
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"

      - name: Install dependencies
        run: "yarn install"

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          push: true
          tags: |
            ghcr.io/unevenlabs/relay-protocol-oracle:latest
            ghcr.io/unevenlabs/relay-protocol-oracle:${{ github.sha }}

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    environment: dev
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ secrets.DEVOPSBOT_TOKEN }}
          VERSION: ${{ github.sha }}
        run: |
          payload=$(printf '{"event_type":"deploy","client_payload":{"app":"relay-protocol-oracle","version":"%s","environment":"dev","actor":"%s"}}' "$VERSION" "${{ github.actor }}")
          gh api repos/unevenlabs/k8s-configs/dispatches --method POST --input - <<< "$payload"

      - name: Summary
        if: always()
        run: |
          {
            if [ "${{ job.status }}" = "success" ]; then
              echo "### Deploy ✅"
            else
              echo "### Deploy ❌"
            fi
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **App** | \`relay-protocol-oracle\` |"
            echo "| **Version** | \`${{ github.sha }}\` |"
            echo "| **Environment** | \`dev\` |"
            echo "| **Triggered by** | @${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    environment: prod
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ secrets.DEVOPSBOT_TOKEN }}
          VERSION: ${{ github.sha }}
        run: |
          payload=$(printf '{"event_type":"deploy","client_payload":{"app":"relay-protocol-oracle","version":"%s","environment":"stag","actor":"%s"}}' "$VERSION" "${{ github.actor }}")
          gh api repos/unevenlabs/k8s-configs/dispatches --method POST --input - <<< "$payload"

      - name: Summary
        if: always()
        run: |
          {
            if [ "${{ job.status }}" = "success" ]; then
              echo "### Deploy ✅"
            else
              echo "### Deploy ❌"
            fi
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **App** | \`relay-protocol-oracle\` |"
            echo "| **Version** | \`${{ github.sha }}\` |"
            echo "| **Environment** | \`stag\` |"
            echo "| **Triggered by** | @${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"
