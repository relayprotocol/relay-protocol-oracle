name: Semgrep

on:
  pull_request:
  push:
    branches: [main, staging]

jobs:
  semgrep:
    name: Semgrep — TypeScript security scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Semgrep
        id: semgrep
        run: |
          semgrep scan --config auto --config .semgrep/ --json --output semgrep-results.json || true

          ERROR_COUNT=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep-results.json 2>/dev/null || echo 0)
          echo "error_count=${ERROR_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Install gh CLI
        if: github.event_name == 'pull_request' && always()
        run: |
          apk add --no-cache github-cli

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f semgrep-results.json ]; then
            echo "No Semgrep results file found"
            exit 0
          fi

          python3 .github/scripts/semgrep_comment.py \
            "${{ github.repository }}" \
            "${{ github.event.pull_request.head.sha }}" \
            "${{ github.run_id }}" \
            "${{ github.server_url }}" \
            > comment.md

          # Minimize (collapse) previous Semgrep comments to reduce noise
          COMMENT_IDS=$(gh api \
            "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --paginate --jq '.[] | select(.body | startswith("## Semgrep")) | .node_id')

          for NODE_ID in $COMMENT_IDS; do
            gh api graphql -f query="
              mutation {
                minimizeComment(input: {subjectId: \"${NODE_ID}\", classifier: OUTDATED}) {
                  minimizedComment { isMinimized }
                }
              }" 2>/dev/null || true
          done

          gh pr comment ${{ github.event.pull_request.number }} --body-file comment.md

      - name: Fail on errors
        if: steps.semgrep.outputs.error_count != '0' && steps.semgrep.outputs.error_count != ''
        run: |
          echo "Semgrep found ${{ steps.semgrep.outputs.error_count }} ERROR-severity finding(s). Blocking the build."
          exit 1
