name: Publish public oracle image

on:
  workflow_call:
    inputs:
      dry_run:
        description: "Build locally without pushing images."
        required: true
        type: boolean
      public_tree_artifact:
        description: "Artifact name containing the sanitized public tree tarball."
        required: true
        type: string
      public_version:
        description: "Public release version, for example v1.2.3."
        required: true
        type: string
    secrets:
      PUBLIC_RELEASE_APP_ID:
        required: false
      PUBLIC_RELEASE_APP_PRIVATE_KEY:
        required: false

permissions:
  actions: read
  contents: read
  packages: write

env:
  PUBLIC_IMAGE: ghcr.io/relayprotocol/relay-protocol-oracle

jobs:
  publish:
    name: Build and publish oracle image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Download sanitized public tree
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.public_tree_artifact }}
          path: ${{ runner.temp }}/public-tree-artifact

      - name: Extract sanitized public tree
        env:
          PUBLIC_TREE: ${{ runner.temp }}/public-tree
        run: |
          set -euo pipefail
          mkdir -p "$PUBLIC_TREE"
          tar -xf "$RUNNER_TEMP/public-tree-artifact/public-tree.tar" -C "$PUBLIC_TREE"
          echo "PUBLIC_TREE=$PUBLIC_TREE" >> "$GITHUB_ENV"

      - name: Create public registry token
        id: public_app_token
        if: ${{ ! inputs.dry_run }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.PUBLIC_RELEASE_APP_ID }}
          private-key: ${{ secrets.PUBLIC_RELEASE_APP_PRIVATE_KEY }}
          owner: relayprotocol
          repositories: relay-protocol-oracle
          permission-packages: write

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to public GHCR
        if: ${{ ! inputs.dry_run }}
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ steps.public_app_token.outputs.token }}

      - name: Build public oracle image
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          PUBLIC_VERSION: ${{ inputs.public_version }}
        run: |
          set -euo pipefail

          if [ "$DRY_RUN" = "true" ]; then
            docker buildx build \
              --file "$PUBLIC_TREE/Dockerfile" \
              --tag "${PUBLIC_IMAGE}:${PUBLIC_VERSION}" \
              --tag "${PUBLIC_IMAGE}:latest" \
              --load \
              "$PUBLIC_TREE"
          else
            docker buildx build \
              --file "$PUBLIC_TREE/Dockerfile" \
              --tag "${PUBLIC_IMAGE}:${PUBLIC_VERSION}" \
              --tag "${PUBLIC_IMAGE}:latest" \
              --push \
              "$PUBLIC_TREE"
          fi
